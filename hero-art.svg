  <circle cx="692" cy="198" r="2"/> <circle cx="728" cy="212" r="2"/> <circle cx="764" cy="198" r="2"/>
  <circle cx="800" cy="212" r="2"/> <circle cx="836" cy="198" r="2"/> <circle cx="872" cy="212" r="2"/>
  <circle cx="908" cy="198" r="2"/>
</g>
