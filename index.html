<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つまみぐい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream:   #e6e0d0;
  --ink:     #282218;
  --ink-lt:  #6b5d48;
  --ink-xs:  #a89880;
  --border:  #282218;
  --panel:   #eee8d8;
  --white:   #faf8f2;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}

/* ════════════════════════
   FIXED NAV
════════════════════════ */
.hdr {
  position: fixed; top:0; left:0; right:0;
  height: 50px;
  display: flex; align-items: center;
  padding: 0 36px;
  background: rgba(230,224,208,.97);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1.5px solid var(--ink);
  z-index: 1000;
}
.hdr-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: .12em; color: var(--ink);
  text-decoration: none; margin-right: auto;
}
.hdr-nav { display: flex; align-items: center; gap: 2px; }
.hdr-link {
  font-size: 12px; letter-spacing: .06em;
  color: var(--ink-lt); padding: 6px 13px;
  border-radius: 6px; text-decoration: none;
  transition: background .15s, color .15s;
}
.hdr-link:hover { background: rgba(40,34,24,.08); color: var(--ink); }
.hdr-search {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--ink); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--ink);
  transition: background .15s; margin-left: 8px;
}
.hdr-search:hover { background: rgba(40,34,24,.1); }

/* ════════════════════════
   MAIN LAYOUT
════════════════════════ */
.page {
  padding-top: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

/* ════════════════════════
   INFOGRAPHIC IMAGE SECTION
════════════════════════ */
.hero {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 24px 0;
  position: relative;
}

/* Image + clickable hotspot overlay container */
.hero-inner {
  position: relative;
  /* max width based on image aspect ratio (921x1152) */
  width: min(680px, 100%);
}

.hero-img {
  display: block;
  width: 100%;
  height: auto;
  /* subtle shadow to float the image */
  filter: drop-shadow(0 8px 32px rgba(40,34,24,.18));
}

/* ── Clickable hotspot overlays on the image ── */
/* Coordinates measured from actual image (921x1152px) */
.hotspot {
  position: absolute;
  cursor: pointer;
  border-radius: 12px;
  text-decoration: none;
  transition: background .18s;
  /* label badge */
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 10px;
}
.hotspot:hover {
  background: rgba(255, 255, 255, .22);
  outline: 3px solid rgba(40,34,24,.35);
  outline-offset: -2px;
}
.hotspot-label {
  opacity: 0;
  background: rgba(40,34,24,.82);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  padding: 5px 12px;
  border-radius: 20px;
  transition: opacity .18s;
  pointer-events: none;
  white-space: nowrap;
}
.hotspot:hover .hotspot-label { opacity: 1; }

/* ── Precise panel positions (% of image 921×1152) ──
   Left top  (毎日のお気に入り): x30-310, y370-712
   Left bot  (カフェ&映画館):    x30-310, y725-942
   Right top (癒やしと楽しみ):  x608-890, y370-712
   Right bot (旅行&写真):       x608-890, y725-942        */
.hs-left-top  { left:3.3%;  top:32.1%; width:30.4%; height:29.7%; }
.hs-left-bot  { left:3.3%;  top:62.9%; width:30.4%; height:18.8%; }
.hs-right-top { left:66.0%; top:32.1%; width:30.5%; height:29.7%; }
.hs-right-bot { left:66.0%; top:62.9%; width:30.5%; height:18.8%; }

/* ════════════════════════
   NAVIGATION SECTION
════════════════════════ */
.nav-section {
  width: 100%;
  max-width: 720px;
  padding: 36px 24px 60px;
}

.nav-title {
  text-align: center;
  font-size: 10px;
  letter-spacing: .4em;
  color: var(--ink-xs);
  margin-bottom: 20px;
  text-transform: uppercase;
}
.nav-title::before { content: '—— '; }
.nav-title::after  { content: ' ——'; }

.nav-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.nav-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 22px 12px 18px;
  border: 2px solid var(--ink);
  border-radius: 14px;
  background: var(--panel);
  text-decoration: none;
  color: var(--ink);
  cursor: pointer;
  transition: background .15s, transform .15s;
}
.nav-card:hover {
  background: var(--white);
  transform: translateY(-3px);
}
.nav-card-icon { font-size: 26px; line-height: 1; }
.nav-card-ja {
  font-size: 13px; font-weight: 700;
  letter-spacing: .06em;
}
.nav-card-en {
  font-size: 8.5px;
  letter-spacing: .22em;
  color: var(--ink-xs);
}

/* ════════════════════════
   FOOTER
════════════════════════ */
footer {
  width: 100%;
  text-align: center;
  padding: 22px 0 36px;
  border-top: 1.5px solid var(--ink);
  font-size: 10.5px;
  color: var(--ink-xs);
  letter-spacing: .22em;
}

/* ════════════════════════
   RESPONSIVE
════════════════════════ */
@media (max-width: 600px) {
  .hero { padding: 24px 16px 0; }
  .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .hdr-nav .hdr-link:not(:nth-child(-n+3)) { display: none; }
}
</style>
</head>
<body>

<!-- ═══ FIXED HEADER ═══ -->
<header class="hdr">
  <a class="hdr-logo" href="index.html">つまみぐい</a>
  <nav class="hdr-nav">
    <a class="hdr-link" href="works.html">作品</a>
    <a class="hdr-link" href="sweets.html">スイーツ</a>
    <a class="hdr-link" href="diary.html">日記</a>
    <a class="hdr-link" href="words.html">言葉</a>
    <a class="hdr-link" href="profile.html">プロフィール</a>
  </nav>
  <button class="hdr-search">🔍</button>
</header>

<div class="page">

  <!-- ═══ INFOGRAPHIC IMAGE ═══ -->
  <section class="hero">
    <div class="hero-inner">
      <img
        class="hero-img"
        src="harumayou-infographic.png"
        alt="HARUMA YOU'S WORLD — つまみぐいインフォグラフィック"
      >
      <!-- Clickable zones over the image (aligned to each panel frame) -->
      <a class="hotspot hs-left-top"  href="diary.html">
        <span class="hotspot-label">📔 日記へ</span>
      </a>
      <a class="hotspot hs-left-bot"  href="works.html">
        <span class="hotspot-label">🎬 作品へ</span>
      </a>
      <a class="hotspot hs-right-top" href="sweets.html">
        <span class="hotspot-label">🧁 スイーツへ</span>
      </a>
      <a class="hotspot hs-right-bot" href="profile.html">
        <span class="hotspot-label">👤 プロフィールへ</span>
      </a>
    </div>
  </section>

  <!-- ═══ NAVIGATION CARDS ═══ -->
  <section class="nav-section">
    <div class="nav-title">COLLECTIONS</div>
    <div class="nav-grid">
      <a class="nav-card" href="works.html">
        <div class="nav-card-icon">🎬</div>
        <div class="nav-card-ja">作品</div>
        <div class="nav-card-en">WORKS</div>
      </a>
      <a class="nav-card" href="sweets.html">
        <div class="nav-card-icon">🧁</div>
        <div class="nav-card-ja">スイーツ</div>
        <div class="nav-card-en">SWEETS</div>
      </a>
      <a class="nav-card" href="diary.html">
        <div class="nav-card-icon">📔</div>
        <div class="nav-card-ja">日記</div>
        <div class="nav-card-en">DIARY</div>
      </a>
      <a class="nav-card" href="words.html">
        <div class="nav-card-icon">✍️</div>
        <div class="nav-card-ja">言葉</div>
        <div class="nav-card-en">WORDS</div>
      </a>
    </div>
  </section>

</div><!-- /page -->

<footer>
  <p>© 2025 つまみぐい — PERSONAL COLLECTION SITE</p>
</footer>

<script src="search.js"></script>
</body>
</html>
